<form class="form__content" action="#">
  <div class="form__body form__row-1">
    <div class="form-group">
      <input id="auth-fiz-tel" class="form-input" name="auth-fiz-tel" type="tel">
      <label for="auth-fiz-tel" class="form-label">
        Телефон
      </label>
      <div class="form-link">
        <a href="javascript:void(0)">
          Отправить код
        </a>
      </div>
    </div>
    <div class="form-group">
      <input id="auth-fiz-code" class="form-input" name="auth-fiz-code" type="text">
      <label for="auth-fiz-code" class="form-label">
        Код из смс
      </label>
    </div>
  </div>
  <div class="form__mid">
    <div class="form-captcha">
      <img src="./images/temp/captcha.png" alt="">
    </div>
    <div class="form-link">
      <a href="/Motorist/registration.html">
        Регистрация
      </a>
    </div>
  </div>
  <div class="form-foot">
    <button class="btn btn--blue" data-fancybox href="#popup-auth-success">
      Войти
    </button>
    <div class="form-group">
      <input id="auth-fiz-checkbox-1" class="form-checkbox" type="checkbox" required>
      <label for="auth-fiz-checkbox-1">
        <div class="form-checkbox--item">
        </div>
        <p>
          Я согласен на <a href="/Motorist">обработку персональных данных</a>
        </p>
      </label>
    </div>
    <div class="form-group">
      <input id="auth-fiz-checkbox-2" class="form-checkbox" type="checkbox" required>
      <label for="auth-fiz-checkbox-2">
        <div class="form-checkbox--item">
        </div>
        <p>
          Я согласен на <a href="/Motorist">рекламные уведомления</a>
        </p>
      </label>
    </div>
    <div class="form-text">
      <p>
        Нажимая на кнопку «Отправить» вы соглашаетесь с <a href="/Motorist">Политикой обработки персональных
          данных</a>
      </p>
    </div>
  </div>
</form>
