<div class="cabinet__block">
  <div class="cabinet__block-head">
    <div class="cabinet__block-title h5">
      Ваши данные
    </div>
  </div>
  <div class="cabinet__block-body">
    <div class="form__body form__row-2">
      <div class="form-group">
        <input id="lk-fiz-name" class="form-input" name="lk-fiz-name" type="text">
        <label for="lk-fiz-name" class="form-label">
          Имя
        </label>
      </div>
      <div class="form-group">
        <input id="lk-fiz-tel" class="form-input" name="lk-fiz-tel" type="tel" required>
        <label for="lk-fiz-tel" class="form-label">
          Телефон <span>*</span>
        </label>
      </div>
      <div class="form-group">
        <input id="lk-fiz-mail" class="form-input" name="lk-fiz-mail" type="email">
        <label for="lk-fiz-mail" class="form-label">
          Эл.почта
        </label>
        <div class="form-link">
          <a href="javascript:void(0)">
            Подтвердить почту
          </a>
        </div>
      </div>
    </div>
    <div class="form__foot">
      <button class="btn btn--arrow-gray" disabled>
        Редактировать
        <i class="icon-arrow"></i>
      </button>
      <button class="btn btn--arrow-blue" disabled>
        Сохранить
        <i class="icon-arrow"></i>
      </button>
    </div>
  </div>
</div>
