<div class="cabinet__block">
  <div class="cabinet__block-head">
    <div class="cabinet__block-title h5">
      Ваши данные
    </div>
  </div>
  <div class="cabinet__block-body">
    <div class="form__body form__row-2">
      <div class="form-group">
        <input id="lk-yur-company-name" class="form-input" name="lk-yur-company-name" type="text" required>
        <label for="lk-yur-company-name" class="form-label">
          Наименование компании <span>*</span>
        </label>
      </div>
      <div class="form-group">
        <input id="lk-yur-name" class="form-input" name="lk-yur-name" type="text" required>
        <label for="lk-yur-name" class="form-label">
          Имя <span>*</span>
        </label>
      </div>
      <div class="form-group">
        <input id="lk-yur-mail" class="form-input" name="lk-yur-mail" type="email" required>
        <label for="lk-yur-mail" class="form-label">
          Эл.почта <span>*</span>
        </label>
        <div class="form-link">
          <a href="javascript:void(0)">
            Подтвердить почту
          </a>
        </div>
      </div>
      <div class="form-group">
        <input id="lk-yur-tel" class="form-input" name="lk-yur-tel" type="tel" required>
        <label for="lk-yur-tel" class="form-label">
          Телефон <span>*</span>
        </label>
      </div>
    </div>
    <div class="form__foot">
      <button class="btn btn--arrow-gray" disabled>
        Редактировать
        <i class="icon-arrow"></i>
      </button>
      <button class="btn btn--arrow-blue" disabled>
        Сохранить
        <i class="icon-arrow"></i>
      </button>
    </div>
  </div>
</div>
<div class="cabinet__block">
  <div class="cabinet__block-head">
    <div class="cabinet__block-title h5">
      Реквизиты компании
    </div>
  </div>
  <div class="cabinet__block-body">
    <div class="form__body form__row-2">
      <div class="form-group">
        <input id="lk-yur-inn" class="form-input" name="lk-yur-inn" type="text" required>
        <label for="lk-yur-inn" class="form-label">
          ИНН <span>*</span>
        </label>
      </div>
      <div class="form-group">
        <input id="lk-yur-kpp" class="form-input" name="lk-yur-kpp" type="text" required>
        <label for="lk-yur-kpp" class="form-label">
          КПП <span>*</span>
        </label>
      </div>
    </div>
    <div class="form__foot">
      <button class="btn btn--arrow-gray" disabled>
        Редактировать
        <i class="icon-arrow"></i>
      </button>
      <button class="btn btn--arrow-blue" disabled>
        Сохранить
        <i class="icon-arrow"></i>
      </button>
    </div>
  </div>
</div>
<div class="cabinet__block">
  <div class="cabinet__block-head">
    <div class="cabinet__block-title h5">
      Карточка компании
    </div>
  </div>
  <div class="cabinet__block-body">
    <div class="form__body">
      <div class="form-group">
        <input id="lk-yur-card" class="form-file form-input" name="lk-yur-card" type="file">
        <label for="lk-yur-card" class="form-file-label">
          <i class="icon-form-photo-camera"></i>
          <div class="form-file-text">
            <p>Загрузить файл</p> <span>(не более 1 мб)</span>
          </div>
        </label>
      </div>
    </div>
    <div class="form-foot">
      <button class="btn btn--arrow-blue" disabled>
        Загрузить
        <i class="icon-arrow"></i>
      </button>
    </div>
  </div>
</div>
<div class="cabinet__block">
  <div class="cabinet__block-head">
    <div class="cabinet__block-title h5">
      Сменить пароль
    </div>
  </div>
  <div class="cabinet__block-body">
    <div class="form__body form__row-2">
      <div class="form-group">
        <input id="lk-yur-password" class="form-input" name="lk-yur-password" type="password">
        <label for="lk-yur-password" class="form-label">
          Пароль <span>*</span>
        </label>
      </div>
      <div class="form-group">
        <input id="lk-yur-repassword" class="form-input" name="lk-yur-repassword" type="password">
        <label for="lk-yur-repassword" class="form-label">
          Подтверждение пароля <span>*</span>
        </label>
      </div>
    </div>
    <div class="form__foot">
      <button class="btn btn--arrow-gray" disabled>
        Редактировать
        <i class="icon-arrow"></i>
      </button>
      <button class="btn btn--arrow-blue" disabled>
        Сохранить
        <i class="icon-arrow"></i>
      </button>
    </div>
  </div>
</div>
