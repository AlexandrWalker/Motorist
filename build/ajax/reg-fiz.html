<div class="registration__head"></div>

<form class="registration__body" action="#">
  <div class="registration__block">
    <div class="registration__block-head">
      <div class="registration__block-title h5">
        Ваши данные
      </div>
    </div>
    <div class="registration__block-body">
      <div class="form__body form__row-3">
        <div class="form-group">
          <input id="reg-fiz-name" class="form-input" name="reg-fiz-name" type="text" required>
          <label for="reg-fiz-name" class="form-label">
            Имя <span>*</span>
          </label>
        </div>
        <div class="form-group">
          <input id="reg-fiz-tel" class="form-input" name="reg-fiz-tel" type="tel" required>
          <label for="reg-fiz-tel" class="form-label">
            Телефон <span>*</span>
          </label>
        </div>
        <div class="form-group">
          <input id="reg-fiz-mail" class="form-input" name="reg-fiz-mail" type="email">
          <label for="reg-fiz-mail" class="form-label">
            Эл.почта
          </label>
        </div>
      </div>
    </div>
    <div class="registration__block-head">
      <div class="registration__block-title h5">
        Подтверждение телефона по смс
      </div>
    </div>
    <div class="registration__block-body">
      <div class="form__body form__row-3">
        <div class="form-group">
          <input id="reg-fiz-code" class="form-input" name="reg-fiz-code" type="text">
          <label for="reg-fiz-code" class="form-label">
            Введите код
          </label>
          <div class="form-link">
            <a href="javascript:void(0)">
              Выслать код подтверждения
            </a>
          </div>
        </div>
        <div class="form-group">
          <button class="registration__btn btn btn--blue" disabled>
            Подтвердить
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="form-captcha">
    <img src="./images/temp/captcha.png" alt="">
  </div>
  <div class="form-foot">
    <button class="registration__btn btn btn--blue">
      Регистрация
    </button>
    <div class="form-group">
      <input id="reg-fiz-checkbox-1" class="form-checkbox" type="checkbox" required>
      <label for="reg-fiz-checkbox-1">
        <div class="form-checkbox--item">
        </div>
        <p>
          Я согласен на <a href="/Motorist">обработку персональных данных</a>
        </p>
      </label>
    </div>
    <div class="form-group">
      <input id="reg-fiz-checkbox-2" class="form-checkbox" type="checkbox" required>
      <label for="reg-fiz-checkbox-2">
        <div class="form-checkbox--item">
        </div>
        <p>
          Я согласен на <a href="/Motorist">рекламные уведомления</a>
        </p>
      </label>
    </div>
    <div class="form-text">
      <p>
        Нажимая на кнопку «Отправить» вы соглашаетесь с <a href="/Motorist">Политикой обработки персональных
          данных</a>
      </p>
    </div>
  </div>
</form>
